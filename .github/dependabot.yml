version: 2
updates:
  # ── pnpm packages ─────────────────────────────────────────────────────────
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 15
    labels:
      - "dependencies"
      - "pnpm"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        labels:
          - "dependencies"
          - "pnpm"
          - "production"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        labels:
          - "dependencies"
          - "pnpm"
          - "dev"

  # ── Docker base images ──────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"
    groups:
      docker-images:
        patterns:
          - "*"
        labels:
          - "dependencies"
          - "docker"
          - "infrastructure"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
      - "infrastructure"
    groups:
      github-actions:
        patterns:
          - "*"
        labels:
          - "dependencies"
          - "ci"
          - "infrastructure"
