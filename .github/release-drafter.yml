name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking"
      - "breaking-change"
  - title: "Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "Maintenance"
    labels:
      - "chore"
      - "dependencies"
      - "maintenance"
  - title: "Documentation"
    labels:
      - "docs"
      - "documentation"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

no-changes-template: "No changes."

version-resolver:
  major:
    labels:
      - "breaking"
      - "breaking-change"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bugfix"
      - "bug"
      - "chore"
      - "dependencies"
      - "maintenance"
  default: patch

autolabeler:
  - label: "chore"
    title:
      - "/^chore/i"
  - label: "bug"
    title:
      - "/^fix/i"
      - "/^bug/i"
  - label: "feature"
    title:
      - "/^feat/i"
      - "/^feature/i"
  - label: "breaking"
    title:
      - "/^breaking/i"
  - label: "docs"
    title:
      - "/^docs/i"

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

  ## Contributors

  $CONTRIBUTORS
